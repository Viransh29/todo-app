<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List - App</title>
    <link rel="stylesheet" href="./output.css">
    <script src="script.js" defer></script>
</head>
<body class="bg-gray-800 text-white">
<div id="container" class="flex flex-col justify-center items-center min-h-screen">

    <!-- Title -->
    <h1 class="text-3xl font-bold p-5 m-3 flex flex-col text-white justify-center items-center border-2 rounded-md">To Do List</h1>
    
    <!-- Card -->
     <div class="border-2 rounded-md p-4 m-5 flex bg-black gap-5 ">
        <input  id="todo-input" class="border-2 rounded-md px-4 py-2 h-8" type="text" placeholder="Enter your task...">
        <button id="addtask-btn" class="bg-red-500 border-red-500 hover:bg-red-600 rounded-md px-4 py-1 h-8">Add Task</button>
     </div>

     <!-- Tasks -->
      <div class="flex flex-col bg-black border-2 rounded-md p-6">
        <p class="font-bold mb-4 text-2xl">Tasks :</p>
         <ul id="todo-list" class="space-y-3">
        </ul>
    </div>
</div>
</body>
</html>
